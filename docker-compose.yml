services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mkpi-app
    restart: unless-stopped
    network_mode: host
    env_file:
      - .env
    environment:
      - PORT=3020
      - HOSTNAME=0.0.0.0
      - NODE_ENV=production
      - TZ=Asia/Bangkok
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3020/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
