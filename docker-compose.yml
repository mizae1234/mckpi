services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ev7training-app
    restart: unless-stopped
    ports:
      - "3020:3000"
    environment:
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD}@db:5432/ev7training?schema=public
      - AUTH_SECRET=${AUTH_SECRET}
      - AUTH_TRUST_HOST=true
      - NEXTAUTH_URL=https://learning.ev7tracking.com
      - NEXT_PUBLIC_APP_URL=https://learning.ev7tracking.com
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      db:
        condition: service_healthy
    networks:
      - ev7training-network

  db:
    image: postgres:16-alpine
    container_name: ev7training-db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=ev7training
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - ev7training-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ev7training"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - ev7training-network

volumes:
  ev7training-pgdata:

networks:
  ev7training-network:
    driver: bridge
